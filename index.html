<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1024, user-scalable=no">
    <title>Premium Dashboard iPad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@400;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-grad: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            --accent: #3b82f6;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #020617;
            color: #f8fafc;
            margin: 0; padding: 20px;
            overflow: hidden; height: 100vh; width: 100vw;
            box-sizing: border-box;
            transition: background 0.5s ease;
        }
        h1, h2 { font-family: 'Outfit', sans-serif; }

        .bg-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: var(--bg-grad);
            transition: background 0.5s ease;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 35px;
            margin-bottom: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            box-sizing: border-box;
        }

        .main-container {
            display: table; width: 100%; height: 90vh;
            border-spacing: 20px 0; border-collapse: separate;
            table-layout: fixed;
        }
        .col { display: table-cell; vertical-align: top; }
        .col-left { width: 58%; }
        .col-right { width: 42%; }

        .time-text {
            font-size: 8.5rem; line-height: 1.1; font-weight: 800;
            display: inline-block; letter-spacing: -4px;
        }

        .clearfix::after { content: ""; clear: both; display: table; }

        /* Estilo para el botón de temas */
        .theme-btn {
            position: fixed; bottom: 30px; right: 30px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 15px; border-radius: 50%;
            color: white; font-size: 20px;
            cursor: pointer; z-index: 100;
        }
    </style>
</head>
<body class="theme-ocean">
    <div class="bg-wrapper" id="bg"></div>

    <!-- Botón para cambiar temas -->
    <button class="theme-btn" onclick="nextTheme()" title="Cambiar Color">
        <i class="fas fa-magic"></i>
    </button>

    <div class="main-container">
        <!-- Columna Izquierda -->
        <div class="col col-left">
            <div class="glass">
                <h2 id="greeting" class="text-2xl font-light text-slate-400">Buenas tardes,</h2>
                <div class="clearfix">
                    <span id="time" class="time-text text-white">00:00</span>
                    <span id="ampm" class="text-3xl font-semibold text-slate-500" style="vertical-align: 45px; margin-left: 10px;">PM</span>
                </div>
                <p id="date" class="text-2xl text-slate-300 mt-4 font-light italic">Cargando fecha...</p>
            </div>

            <div class="glass" style="margin-bottom: 0;">
                <div style="border-left: 5px solid var(--accent); padding-left: 25px;">
                    <p id="quote-text" class="text-2xl font-normal leading-relaxed text-slate-100 italic">"..."</p>
                    <p id="quote-author" class="text-sm text-blue-400 mt-3 font-semibold uppercase tracking-widest">— ...</p>
                </div>
            </div>
        </div>

        <!-- Columna Derecha -->
        <div class="col col-right">
            <!-- Clima -->
            <div class="glass">
                <div class="clearfix">
                    <i id="weather-icon" class="fas fa-sun" style="font-size: 5rem; color: #fbbf24; float: left;"></i>
                    <span id="temperature" style="font-size: 5.5rem; font-weight: 800; float: right; line-height: 1;">--°</span>
                </div>
                <div style="margin-top: 30px;">
                    <p id="weather-desc" class="text-3xl font-semibold capitalize text-white">Cargando...</p>
                    <p class="text-lg text-slate-400 mt-2">
                        <i class="fas fa-location-dot" style="color: var(--accent); margin-right: 5px;"></i> Concepción del Uruguay
                    </p>
                </div>
            </div>

            <!-- Mercado / Dólar -->
            <div class="glass" style="margin-bottom: 0;">
                <h3 class="text-xs uppercase text-slate-500 font-semibold tracking-widest mb-4">Mercado de Divisas</h3>
                <div class="clearfix" style="margin-bottom: 15px;">
                    <div style="float: left;">
                        <span class="text-blue-400 font-bold">DÓLAR BLUE</span>
                    </div>
                    <div style="float: right; text-align: right;">
                        <span id="dolar-blue" class="text-2xl font-bold">$---</span>
                    </div>
                </div>
                <div class="clearfix">
                    <div style="float: left;">
                        <span class="text-slate-400">DÓLAR OFICIAL</span>
                    </div>
                    <div style="float: right; text-align: right;">
                        <span id="dolar-oficial" class="text-xl text-slate-300">$---</span>
                    </div>
                </div>
                <div style="margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; text-align: center;">
                    <p class="text-xs text-slate-500 italic">Actualización automática cada 1h</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- TEMAS ---
        var themes = [
            { bg: "radial-gradient(circle at center, #0f172a 0%, #020617 100%)", acc: "#3b82f6" }, // Océano
            { bg: "radial-gradient(circle at center, #064e3b 0%, #022c22 100%)", acc: "#10b981" }, // Esmeralda
            { bg: "radial-gradient(circle at center, #4c1d95 0%, #1e1b4b 100%)", acc: "#8b5cf6" }, // Sunset
            { bg: "radial-gradient(circle at center, #450a0a 0%, #000000 100%)", acc: "#ef4444" }  // Sangría/Gótico
        ];
        var currentTheme = 0;
        function nextTheme() {
            currentTheme = (currentTheme + 1) % themes.length;
            document.getElementById('bg').style.background = themes[currentTheme].bg;
            document.documentElement.style.setProperty('--accent', themes[currentTheme].acc);
        }

        // --- RELOJ ---
        function updateTime() {
            var now = new Date();
            var hours = now.getHours();
            var min = now.getMinutes();
            var greeting = (hours < 12) ? 'Buen día,' : (hours < 19 ? 'Buenas tardes,' : 'Buenas noches,');
            
            document.getElementById('time').innerHTML = (hours % 12 || 12) + ":" + (min < 10 ? '0' + min : min);
            document.getElementById('ampm').innerText = hours >= 12 ? 'PM' : 'AM';
            document.getElementById('greeting').innerText = greeting;
            document.getElementById('date').innerText = now.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
        }
        setInterval(updateTime, 1000); updateTime();

        // --- CLIMA ---
        async function fetchWeather() {
            try {
                var res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=-32.4825&longitude=-58.2372&current_weather=true');
                var data = await res.json();
                document.getElementById('temperature').innerText = Math.round(data.current_weather.temperature) + '°';
                document.getElementById('weather-desc').innerText = "Cielo Despejado";
            } catch(e) {}
        }
        fetchWeather();

        // --- DÓLAR (API Argentina) ---
        async function fetchDolar() {
            try {
                var res = await fetch('https://dolarapi.com/v1/dolares');
                var data = await res.json();
                data.forEach(function(d) {
                    if(d.casa === 'blue') document.getElementById('dolar-blue').innerText = "$" + Math.round(d.venta);
                    if(d.casa === 'oficial') document.getElementById('dolar-oficial').innerText = "$" + Math.round(d.venta);
                });
            } catch(e) {
                document.getElementById('dolar-blue').innerText = "N/A";
            }
        }
        fetchDolar(); setInterval(fetchDolar, 3600000);

        // --- FRASES ---
        var quotes = [
            {t: "No cuentes los días, haz que los días cuenten.", a: "M. Ali"},
            {t: "Si puedes soñarlo, puedes hacerlo.", a: "W. Disney"}
        ];
        var q = quotes[Math.floor(Math.random()*quotes.length)];
        document.getElementById('quote-text').innerText = '"' + q.t + '"';
        document.getElementById('quote-author').innerText = "— " + q.a;
    </script>
</body>
</html>

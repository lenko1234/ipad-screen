<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1024, user-scalable=no">
    <title>Premium Dashboard iPad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@400;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-grad: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            --accent: #3b82f6;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #020617;
            color: #f8fafc;
            margin: 0; padding: 0;
            overflow: hidden; height: 100vh; width: 100vw;
            box-sizing: border-box;
            transition: background 0.5s ease;
        }
        h1, h2 { font-family: 'Outfit', sans-serif; }

        .bg-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: var(--bg-grad);
            transition: background 0.5s ease;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 35px;
            margin-bottom: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            box-sizing: border-box;
            position: relative;
        }

        .main-container {
            display: table; width: 100%; height: auto;
            border-spacing: 25px 0; border-collapse: separate;
            table-layout: fixed;
            margin-top: 60px;
        }
        .col { display: table-cell; vertical-align: top; }
        .col-left { width: 58%; }
        .col-right { width: 42%; }

        .time-text {
            font-size: 8.5rem; line-height: 1.1; font-weight: 800;
            display: inline-block; letter-spacing: -4px;
        }

        .clearfix::after { content: ""; clear: both; display: table; }

        .theme-btn {
            position: fixed;
            top: 25px; right: 25px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            width: 45px; height: 45px;
            border-radius: 12px;
            color: rgba(255,255,255,0.3);
            font-size: 18px;
            cursor: pointer; z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s ease;
        }
        .theme-btn:active {
            background: rgba(255,255,255,0.2);
            transform: scale(0.9);
        }
    </style>
</head>
<body>
    <div class="bg-wrapper" id="bg"></div>

    <button class="theme-btn" onclick="nextTheme()" title="Cambiar Tema">
        <i class="fas fa-pencil-alt"></i>
    </button>

    <div class="main-container">
        <!-- Columna Izquierda -->
        <div class="col col-left">
            <div class="glass">
                <h2 id="greeting" class="text-2xl font-light text-slate-400">&nbsp;</h2>
                <div class="clearfix">
                    <span id="time" class="time-text text-white">00:00</span>
                    <span id="ampm" class="text-3xl font-semibold text-slate-500" style="vertical-align: 45px; margin-left: 10px;">&nbsp;</span>
                </div>
                <p id="date" class="text-2xl text-slate-300 mt-4 font-light italic">&nbsp;</p>
            </div>

            <div class="glass" style="margin-bottom: 0;">
                <div style="border-left: 5px solid var(--accent); padding-left: 25px;">
                    <p id="quote-text" class="text-2xl font-normal leading-relaxed text-slate-100 italic">&nbsp;</p>
                    <p id="quote-author" class="text-sm text-blue-400 mt-3 font-semibold uppercase tracking-widest">&nbsp;</p>
                </div>
            </div>
        </div>

        <!-- Columna Derecha -->
        <div class="col col-right">
            <!-- Clima -->
            <div class="glass">
                <div class="clearfix">
                    <i id="weather-icon" class="fas fa-sun" style="font-size: 5rem; color: #fbbf24; float: left; opacity: 0;"></i>
                    <span id="temperature" style="font-size: 5.5rem; font-weight: 800; float: right; line-height: 1;">&nbsp;</span>
                </div>
                <div style="margin-top: 30px;">
                    <p id="weather-desc" class="text-3xl font-semibold capitalize text-white">&nbsp;</p>
                    <p class="text-lg text-slate-400 mt-2">
                        <i class="fas fa-location-dot" style="color: var(--accent); margin-right: 5px;"></i> Concepción del Uruguay
                    </p>
                </div>
            </div>

            <!-- Mercado / Dólar Blue -->
            <div class="glass" style="margin-bottom: 0;">
                <h3 class="text-xs uppercase text-slate-500 font-semibold tracking-widest mb-6">Cotización Dólar Blue</h3>
                
                <div class="clearfix" style="margin-bottom: 20px;">
                    <div style="float: left;">
                        <span class="text-slate-400 text-lg">COMPRA</span>
                    </div>
                    <div style="float: right; text-align: right;">
                        <span id="blue-compra" class="text-3xl font-bold text-white">&nbsp;</span>
                    </div>
                </div>

                <div class="clearfix">
                    <div style="float: left;">
                        <span class="text-blue-400 text-lg font-bold">VENTA</span>
                    </div>
                    <div style="float: right; text-align: right;">
                        <span id="blue-venta" class="text-4xl font-extrabold text-blue-400">&nbsp;</span>
                    </div>
                </div>

                <div style="margin-top: 25px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; text-align: center;">
                    <p class="text-xs text-slate-500 italic">Datos en tiempo real (dolarapi.com)</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- TEMAS ---
        var themes = [
            { bg: "radial-gradient(circle at center, #0f172a 0%, #020617 100%)", acc: "#3b82f6" }, 
            { bg: "radial-gradient(circle at center, #064e3b 0%, #022c22 100%)", acc: "#10b981" }, 
            { bg: "radial-gradient(circle at center, #4c1d95 0%, #1e1b4b 100%)", acc: "#8b5cf6" }, 
            { bg: "radial-gradient(circle at center, #450a0a 0%, #000000 100%)", acc: "#ef4444" },
            { bg: "radial-gradient(circle at center, #134e4a 0%, #042f2e 100%)", acc: "#2dd4bf" },
            { bg: "radial-gradient(circle at center, #831843 0%, #500724 100%)", acc: "#f472b6" },
            { bg: "radial-gradient(circle at center, #171717 0%, #000000 100%)", acc: "#a3a3a3" }, 
            { bg: "radial-gradient(circle at center, #7c2d12 0%, #431407 100%)", acc: "#fb923c" },
            { bg: "radial-gradient(circle at center, #020617 0%, #0f172a 100%)", acc: "#d946ef" }
        ];
        var currentTheme = 0;
        function nextTheme() {
            currentTheme = (currentTheme + 1) % themes.length;
            document.getElementById('bg').style.background = themes[currentTheme].bg;
            document.documentElement.style.setProperty('--accent', themes[currentTheme].acc);
        }

        // --- RELOJ ---
        function updateTime() {
            var now = new Date();
            var hours = now.getHours();
            var min = now.getMinutes();
            var greeting = (hours < 12) ? 'Buen día,' : (hours < 19 ? 'Buenas tardes,' : 'Buenas noches,');
            document.getElementById('time').innerHTML = (hours % 12 || 12) + ":" + (min < 10 ? '0' + min : min);
            document.getElementById('ampm').innerText = hours >= 12 ? 'PM' : 'AM';
            document.getElementById('greeting').innerText = greeting;
            document.getElementById('date').innerText = now.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
        }
        setInterval(updateTime, 1000); updateTime();

        // --- CLIMA ---
        async function fetchWeather() {
            try {
                var res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=-32.4825&longitude=-58.2372&current_weather=true');
                var data = await res.json();
                document.getElementById('temperature').innerText = Math.round(data.current_weather.temperature) + '°';
                document.getElementById('weather-desc').innerText = "Cielo Despejado";
                document.getElementById('weather-icon').style.opacity = 1;
            } catch(e) {}
        }
        fetchWeather();

        // --- DÓLAR BLUE ---
        async function fetchDolar() {
            try {
                var res = await fetch('https://dolarapi.com/v1/dolares/blue');
                var data = await res.json();
                document.getElementById('blue-compra').innerText = "$" + Math.round(data.compra);
                document.getElementById('blue-venta').innerText = "$" + Math.round(data.venta);
            } catch(e) {}
        }
        fetchDolar(); setInterval(fetchDolar, 600000);

        // --- 30 FRASES ---
        var quotes = [
            {t: "La única forma de hacer un gran trabajo es amar lo que haces.", a: "Steve Jobs"},
            {t: "No juzgues cada día por lo que cosechas, sino por las semillas que plantas.", a: "R.L. Stevenson"},
            {t: "El éxito es ir de fracaso en fracaso sin perder el entusiasmo.", a: "Winston Churchill"},
            {t: "No dejes que el ayer ocupe demasiado del hoy.", a: "Will Rogers"},
            {t: "La vida es un 10% lo que nos pasa y un 90% cómo reaccionamos.", a: "C. Swindoll"},
            {t: "La mejor preparación para el mañana es hacer lo mejor hoy.", a: "H. Jackson Brown"},
            {t: "Tu tiempo es limitado, no lo malgastes viviendo la vida de otro.", a: "Steve Jobs"},
            {t: "Si buscas resultados distintos, no hagas siempre lo mismo.", a: "Albert Einstein"},
            {t: "La imaginación es más importante que el conocimiento.", a: "Albert Einstein"},
            {t: "Piensa, cree, sueña y atrévete.", a: "Walt Disney"},
            {t: "El único lugar donde el éxito viene antes que el trabajo es el diccionario.", a: "V. Sassoon"},
            {t: "No cuentes los días, haz que los días cuenten.", a: "Muhammad Ali"},
            {t: "La mejor manera de predecir el futuro es inventarlo.", a: "Alan Kay"},
            {t: "Si puedes soñarlo, puedes hacerlo.", a: "Walt Disney"},
            {t: "No hay camino para la paz, la paz es el camino.", a: "Mahatma Gandhi"},
            {t: "Todo lo que puedas imaginar es real.", a: "Pablo Picasso"},
            {t: "El arte de vencer se aprende en las derrotas.", a: "Simón Bolívar"},
            {t: "La paciencia es amarga, pero su fruto es dulce.", a: "J.J. Rousseau"},
            {t: "Nunca es tarde para ser lo que podrías haber sido.", a: "George Eliot"},
            {t: "La vida es lo que sucede mientras haces otros planes.", a: "John Lennon"},
            {t: "Cree que puedes y ya habrás recorrido la mitad del camino.", a: "T. Roosevelt"},
            {t: "Lo que no te mata, te hace más fuerte.", a: "F. Nietzsche"},
            {t: "No importa lo lento que vayas, siempre y cuando no te detengas.", a: "Confucio"},
            {t: "La felicidad no es algo hecho. Viene de tus propias acciones.", a: "Dalai Lama"},
            {t: "Haz hoy lo que otros no quieren, para hacer mañana lo que otros no pueden.", a: "J. Rice"},
            {t: "El hombre que no lee no tiene ventaja sobre el que no sabe leer.", a: "Mark Twain"},
            {t: "Cualquier cosa que la mente conciba y crea, puede lograrlo.", a: "Napoleon Hill"},
            {t: "Da siempre lo mejor de ti. Lo que plantes hoy, cosecharás mañana.", a: "Og Mandino"},
            {t: "La vida empieza donde termina tu zona de confort.", a: "Neale Donald Walsch"},
            {t: "Sé el cambio que quieres ver en el mundo.", a: "Mahatma Gandhi"}
        ];
        
        function changeQuote() {
            var q = quotes[Math.floor(Math.random()*quotes.length)];
            var qEl = document.getElementById('quote-text');
            var aEl = document.getElementById('quote-author');
            qEl.style.opacity = 0; aEl.style.opacity = 0;
            setTimeout(function(){
                qEl.innerText = '"' + q.t + '"';
                aEl.innerText = "— " + q.a.toUpperCase();
                qEl.style.opacity = 1; aEl.style.opacity = 1;
            }, 500);
        }
        changeQuote(); setInterval(changeQuote, 20000);
    </script>
</body>
</html>
